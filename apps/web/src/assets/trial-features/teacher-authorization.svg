<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">老师授权开放界面示意图</title>
  <desc id="desc">教考智联老师端中管理学生申请和章节权限的界面示意。</desc>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="90" y="92" width="1420" height="716" rx="18" fill="#ffffff" stroke="#dbe4ee" stroke-width="3"/>
  <text x="132" y="170" fill="#64748b" font-family="Arial, sans-serif" font-size="30" font-weight="700">专升本《计算机应用基础》</text>
  <text x="132" y="242" fill="#0f172a" font-family="Arial, sans-serif" font-size="62" font-weight="800">老师授权开放</text>
  <rect x="132" y="305" width="1336" height="118" rx="16" fill="#f8fafc" stroke="#dbe4ee" stroke-width="3"/>
  <circle cx="185" cy="364" r="24" fill="#eff6ff" stroke="#2563eb" stroke-width="5"/>
  <path d="M174 365l8 9 18-22" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="232" y="355" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="800">章节权限</text>
  <text x="232" y="394" fill="#64748b" font-family="Arial, sans-serif" font-size="24" font-weight="700">教师审核申请后，按章节开放学生访问。</text>
  <rect x="1005" y="334" width="176" height="58" rx="10" fill="#2563eb"/>
  <text x="1052" y="372" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="800">授权</text>
  <rect x="1204" y="334" width="176" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1251" y="372" fill="#334155" font-family="Arial, sans-serif" font-size="25" font-weight="800">撤销</text>
  <g>
    <rect x="132" y="470" width="398" height="222" rx="16" fill="#ffffff" stroke="#dbe4ee" stroke-width="3"/>
    <circle cx="184" cy="538" r="28" fill="#eff6ff"/>
    <text x="174" y="548" fill="#2563eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">01</text>
    <text x="232" y="532" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="800">学生申请</text>
    <text x="232" y="578" fill="#64748b" font-family="Arial, sans-serif" font-size="23" font-weight="700">姓名、手机号、班级说明</text>
    <rect x="232" y="615" width="210" height="46" rx="23" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="274" y="646" fill="#9a3412" font-family="Arial, sans-serif" font-size="22" font-weight="800">待老师审核</text>
  </g>
  <g>
    <rect x="600" y="470" width="398" height="222" rx="16" fill="#ffffff" stroke="#dbe4ee" stroke-width="3"/>
    <circle cx="652" cy="538" r="28" fill="#eff6ff"/>
    <text x="642" y="548" fill="#2563eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">02</text>
    <text x="700" y="532" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="800">教师审核</text>
    <text x="700" y="578" fill="#64748b" font-family="Arial, sans-serif" font-size="23" font-weight="700">确认学生身份与课程范围</text>
    <rect x="700" y="615" width="210" height="46" rx="23" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="742" y="646" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="22" font-weight="800">开放本章节</text>
  </g>
  <g>
    <rect x="1068" y="470" width="398" height="222" rx="16" fill="#ffffff" stroke="#dbe4ee" stroke-width="3"/>
    <circle cx="1120" cy="538" r="28" fill="#eff6ff"/>
    <text x="1110" y="548" fill="#2563eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">03</text>
    <text x="1168" y="532" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="800">学生学习</text>
    <text x="1168" y="578" fill="#64748b" font-family="Arial, sans-serif" font-size="23" font-weight="700">进入章节、练习和错题回看</text>
    <rect x="1168" y="615" width="210" height="46" rx="23" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text x="1210" y="646" fill="#15803d" font-family="Arial, sans-serif" font-size="22" font-weight="800">已授权访问</text>
  </g>
</svg>
